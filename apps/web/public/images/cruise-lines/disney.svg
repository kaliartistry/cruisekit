<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" fill="none">
  <!-- Castle turret silhouette -->
  <g transform="translate(8, 6)">
    <rect x="8" y="16" width="12" height="20" fill="#0066B2"/>
    <rect x="2" y="20" width="6" height="16" fill="#0066B2"/>
    <rect x="20" y="20" width="6" height="16" fill="#0066B2"/>
    <!-- Turrets -->
    <rect x="3" y="14" width="4" height="6" fill="#0066B2"/>
    <rect x="21" y="14" width="4" height="6" fill="#0066B2"/>
    <rect x="11" y="8" width="6" height="8" fill="#0066B2"/>
    <!-- Turret tops (triangles) -->
    <polygon points="5,14 3,14 5,10 7,14" fill="#0066B2"/>
    <polygon points="23,14 21,14 23,10 25,14" fill="#0066B2"/>
    <polygon points="14,8 11,8 14,2 17,8" fill="#0066B2"/>
    <!-- Flag -->
    <line x1="14" y1="2" x2="14" y2="0" stroke="#0066B2" stroke-width="1"/>
    <polygon points="14,0 18,1.5 14,3" fill="#0066B2"/>
    <!-- Gate arch -->
    <path d="M11,36 Q14,28 17,36" fill="white"/>
  </g>
  <text x="42" y="32" font-family="Verdana, Geneva, sans-serif" font-size="18" font-weight="bold" fill="#0066B2" letter-spacing="0.3">Disney</text>
</svg>
