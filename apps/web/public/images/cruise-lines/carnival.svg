<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" fill="none">
  <!-- Carnival Cruise Line: funnel icon + wordmark -->
  <g transform="translate(10, 5)">
    <!-- Funnel body -->
    <path d="M15,55 L20,15 C20,15 22,8 30,8 C38,8 40,15 40,15 L45,55 Z" fill="#003DA5"/>
    <!-- White band -->
    <path d="M19,42 L21,28 C23,20 27,14 30,14 C33,14 37,20 39,28 L41,42 Z" fill="#FFFFFF"/>
    <!-- Red band -->
    <path d="M20,38 L22,26 C24,20 27,16 30,16 C33,16 36,20 38,26 L40,38 Z" fill="#E4002B"/>
    <!-- Whale tail -->
    <path d="M22,12 C22,12 18,2 12,2 C12,2 18,6 20,12 Z" fill="#003DA5"/>
    <path d="M38,12 C38,12 42,2 48,2 C48,2 42,6 40,12 Z" fill="#003DA5"/>
  </g>
  <!-- Wordmark -->
  <text x="68" y="32" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="bold" fill="#003DA5" letter-spacing="1.5">CARNIVAL</text>
  <text x="68" y="48" font-family="Arial, Helvetica, sans-serif" font-size="9" fill="#003DA5" letter-spacing="3.5">CRUISE LINE</text>
</svg>
